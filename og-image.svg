<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#F4A111" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0d0d0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#F4A111" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d0d0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0d0b"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Top shimmer line -->
  <rect x="360" y="0" width="480" height="1" fill="url(#shimmer)" opacity="0.4"/>
  <defs>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Logo mark -->
  <rect x="80" y="60" width="48" height="48" rx="12" fill="#0a0a08" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <text x="104" y="84" dominant-baseline="central" text-anchor="middle"
    font-family="system-ui, sans-serif" font-weight="900" font-size="26" fill="white">C</text>

  <!-- Studio name -->
  <text x="144" y="84" dominant-baseline="central"
    font-family="system-ui, sans-serif" font-weight="600" font-size="18"
    fill="rgba(240,236,228,0.7)" letter-spacing="-0.3">Caffeine Labs</text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="system-ui, sans-serif" font-weight="300"
    font-size="72" fill="#f0ece4" letter-spacing="-2">Building apps that work</text>
  <text x="80" y="350" font-family="system-ui, sans-serif" font-weight="700"
    font-size="72" fill="#f0ece4" letter-spacing="-2">the way you intended.</text>

  <!-- Divider -->
  <rect x="80" y="410" width="1040" height="1" fill="url(#divider)"/>

  <!-- Product chips -->
  <!-- Labelyze -->
  <rect x="80" y="440" width="220" height="52" rx="10"
    fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.11)" stroke-width="1"/>
  <rect x="92" y="452" width="28" height="28" rx="6"
    fill="rgba(255,255,255,0.06)" stroke="rgba(244,161,17,0.28)" stroke-width="1"/>
  <text x="106" y="466" dominant-baseline="central" text-anchor="middle"
    font-family="system-ui, sans-serif" font-weight="900" font-size="15" fill="#F4A111">L</text>
  <text x="132" y="462" dominant-baseline="central"
    font-family="system-ui, sans-serif" font-weight="700" font-size="15" fill="#f0ece4">Labelyze</text>
  <text x="132" y="478" dominant-baseline="central"
    font-family="system-ui, sans-serif" font-weight="400" font-size="11"
    fill="rgba(240,236,228,0.32)">labelyze.in</text>

  <!-- Rewyr -->
  <rect x="318" y="440" width="200" height="52" rx="10"
    fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.11)" stroke-width="1"/>
  <rect x="330" y="452" width="28" height="28" rx="6"
    fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.11)" stroke-width="1"/>
  <text x="344" y="466" dominant-baseline="central" text-anchor="middle"
    font-family="system-ui, sans-serif" font-weight="900" font-size="15"
    fill="rgba(240,236,228,0.85)">R</text>
  <text x="370" y="462" dominant-baseline="central"
    font-family="system-ui, sans-serif" font-weight="700" font-size="15" fill="#f0ece4">Rewyr</text>
  <text x="370" y="478" dominant-baseline="central"
    font-family="system-ui, sans-serif" font-weight="400" font-size="11"
    fill="rgba(240,236,228,0.32)">rewyr.in</text>

  <!-- Domain -->
  <text x="1120" y="560" text-anchor="end" dominant-baseline="central"
    font-family="system-ui, sans-serif" font-weight="400" font-size="14"
    fill="rgba(240,236,228,0.25)" letter-spacing="0.5">caffeinelabs.in</text>
</svg>
